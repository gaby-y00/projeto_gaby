{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Fluida - Home</title>
</head>
<body>
    <h1>Home aqui</h1>
    <a href="{% url "cadastro" %}">Cadastro</a>
    
    <a href="{% url "login" %}">Login</a>

    <a href="{% url "criar" %}">Nova Tarefa</a>

    
    <h2>Minhas Tarefas</h2>
    <ul>
        {% for tarefa in tarefas %}
            <li>
                <strong>{{ tarefa.titulo }}</strong> - {{ tarefa.categoria }} 
                (Prioridade: {{ tarefa.prioridade }})
            </li>
        {% empty %}
            <li>Nenhuma tarefa cadastrada no momento.</li>
        {% endfor %}
    </ul>
</body>
</html>
